services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: support-intake-api
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      UPLOAD_DIR: ${UPLOAD_DIR:-storage/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      ALLOW_MOCK_LLM: ${ALLOW_MOCK_LLM:-false}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - ./storage:/app/storage

  webapp:
    build:
      context: .
      dockerfile: apps/webapp/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: support-intake-webapp
    depends_on:
      api:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    container_name: support-intake-proxy
    depends_on:
      api:
        condition: service_healthy
      webapp:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
      LE_EMAIL: ${LE_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_config:
  caddy_data:
